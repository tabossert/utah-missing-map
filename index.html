<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <script>
      // Set theme before paint (no flash of the wrong theme).
      (function () {
        try {
          var t = localStorage.getItem('umm-theme');
          if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
    <title>Utah's Missing &amp; Unidentified</title>
    <meta name="description" content="An interactive map of Utah's missing and unidentified persons — last known locations and where the unidentified were found." />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="vendor/markercluster/MarkerCluster.css" />
    <link rel="stylesheet" href="vendor/markercluster/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <a class="skip-link" href="#map">Skip to map</a>

    <header class="app-header">
      <div class="brand">
        <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="Utah's Missing &amp; Unidentified">
          <title>Utah's Missing &amp; Unidentified</title>
          <g transform="translate(8,8)">
            <path d="M32 57 C24 44 14 36 14 25 A18 18 0 1 1 50 25 C50 36 40 44 32 57 Z" fill="#4A6D6F" stroke="#3B5759" stroke-width="1.5" stroke-linejoin="round" />
            <circle cx="32" cy="25" r="12.5" fill="#F7F4EF" />
            <g fill="#7FA9D4"><circle cx="32" cy="18.5" r="5" /><circle cx="38.18" cy="22.99" r="5" /><circle cx="35.82" cy="30.26" r="5" /><circle cx="28.18" cy="30.26" r="5" /><circle cx="25.82" cy="22.99" r="5" /></g>
            <g fill="#A9C7E6"><circle cx="32" cy="17" r="2.2" /><circle cx="39.61" cy="22.53" r="2.2" /><circle cx="36.70" cy="31.47" r="2.2" /><circle cx="27.30" cy="31.47" r="2.2" /><circle cx="24.39" cy="22.53" r="2.2" /></g>
            <circle cx="32" cy="25" r="3.4" fill="#F0C560" />
          </g>
          <g fill="currentColor" font-family="'Iowan Old Style','Palatino Linotype',Georgia,serif" font-size="21" letter-spacing="0.3">
            <text x="86" y="37">Utah's Missing &amp;</text>
            <text x="86" y="60">Unidentified</text>
          </g>
        </svg>
      </div>
      <div class="header-actions">
        <span id="freshness" class="freshness" aria-live="polite"></span>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">☾</button>
        <button id="refresh-btn" class="refresh-btn" title="Check the live map for updates">
          <span class="refresh-icon" aria-hidden="true">⟳</span> Refresh
        </button>
      </div>
    </header>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input id="search" type="search" placeholder="Search by name or year…" aria-label="Search by name or year" />
      </div>
      <button id="filters-toggle" class="filters-toggle" type="button" aria-expanded="false" aria-controls="filters">
        <span aria-hidden="true">⚙</span> Filters
      </button>
      <div class="filters" id="filters">
      <div class="filter-group" role="group" aria-label="Filter by type">
        <span class="filter-label">Type</span>
        <button class="chip active" data-type="Missing" aria-pressed="true">Missing</button>
        <button class="chip active" data-type="Unidentified" aria-pressed="true">Unidentified</button>
      </div>
      <div class="filter-group" role="group" aria-label="Filter by gender">
        <span class="filter-label">Gender</span>
        <button class="chip active" data-gender="Male" aria-pressed="true">Men</button>
        <button class="chip active" data-gender="Female" aria-pressed="true">Women</button>
      </div>
      <div class="filter-group" role="group" aria-label="Filter by decade">
        <span class="filter-label">Years</span>
        <select id="decade-from" aria-label="From decade"></select>
        <span class="dash" aria-hidden="true">–</span>
        <select id="decade-to" aria-label="To decade"></select>
      </div>
      <span id="result-count" class="result-count" aria-live="polite"></span>
      </div>
    </div>

    <main class="stage">
      <div id="map" role="application" aria-label="Map of Utah's missing and unidentified persons"></div>
      <div id="legend" class="legend" aria-label="Marker legend"></div>
      <div id="scorecard-backdrop" class="scorecard-backdrop"></div>
      <aside id="scorecard" class="scorecard" aria-hidden="true" aria-label="Case details">
        <div class="sheet-handle" aria-hidden="true"><span class="sheet-grabber"></span></div>
        <button id="scorecard-close" class="scorecard-close" aria-label="Close case details">×</button>
        <div id="scorecard-body" class="scorecard-body"></div>
      </aside>
    </main>

    <footer class="app-footer">
      <span class="footer-note">
        A community map of Utah's missing &amp; unidentified. Map tiles &copy; OpenStreetMap &amp; CARTO.
      </span>
      <a class="admin-link" href="admin.html">Admin</a>
    </footer>

    <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-label="Photo viewer"></div>

    <script src="vendor/leaflet/leaflet.js"></script>
    <script src="vendor/markercluster/leaflet.markercluster.js"></script>
    <script src="vendor/supabase/supabase.js"></script>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
